<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Prince Signals Pro | הקיסר החדש של עולם המסחר</title>
    <link href="https://fonts.googleapis.com/css2?family=Assistant:wght@300;400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --gold: #d4af37;
            --dark-blue: #0a192f;
            --light-blue: #172a45;
            --white: #e6f1ff;
        }

        body {
            font-family: 'Assistant', sans-serif;
            background-color: var(--dark-blue);
            color: var(--white);
            margin: 0;
            padding: 0;
        }

        header {
            background: linear-gradient(rgba(10, 25, 47, 0.85), rgba(10, 25, 47, 0.85)), url('https://images.unsplash.com/photo-1611974717482-98252c00300c?auto=format&fit=crop&w=1350&q=80');
            background-size: cover;
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            padding: 20px;
        }

        .gold-text { color: var(--gold); }
        h1 { font-size: 3.5rem; margin-bottom: 10px; }
        
        .btn {
            background-color: var(--gold);
            color: var(--dark-blue);
            padding: 15px 40px;
            text-decoration: none;
            font-weight: bold;
            border-radius: 30px;
            font-size: 1.2rem;
            margin-top: 30px;
            transition: 0.3s;
            display: inline-block;
        }

        .btn:hover { background-color: #f1c40f; transform: scale(1.05); }

        .pricing { padding: 80px 10%; text-align: center; }
        .pricing-grid {
            display: flex;
            justify-content: center;
            gap: 30px;
            flex-wrap: wrap;
            margin-top: 40px;
        }

        .price-card {
            background: var(--light-blue);
            padding: 40px;
            border-radius: 20px;
            width: 280px;
            transition: 0.3s;
            border: 1px solid rgba(212, 175, 55, 0.1);
        }

        .price-card.featured {
            border: 2px solid var(--gold);
            transform: scale(1.05);
            background: #1d3354;
        }

        .floating-tg {
            position: fixed;
            bottom: 25px;
            left: 25px;
            background-color: #24A1DE;
            color: white;
            padding: 15px 25px;
            border-radius: 50px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.4);
            text-decoration: none;
            font-weight: bold;
            z-index: 1000;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .chart-container {
            height: 450px;
            margin: 40px 10%;
            background: var(--light-blue);
            border-radius: 15px;
            overflow: hidden;
            border: 1px solid var(--gold);
        }
    </style>
</head>
<body>

    <a href="https://t.me/Tradingprince123_bot" class="floating-tg">
        <span>💬 שלח הודעה לבוט</span>
    </a>

    <header>
        <h1>👑 <span class="gold-text">Prince Signals Pro</span></h1>
        <p>מערכת הניתוח המקצועית למסחר חכם - עכשיו אצלך בטלגרם.</p>
        <a href="#pricing" class="btn">הצטרף עכשיו</a>
    </header>

    <div class="chart-container">
        <div id="tradingview_chart" style="height:100%;"></div>
        <script type="text/javascript" src="https://s3.tradingview.com/tv.js"></script>
        <script type="text/javascript">
        new TradingView.widget({
          "autosize": true,
          "symbol": "BINANCE:BTCUSDT",
          "interval": "60",
          "theme": "dark",
          "style": "1",
          "locale": "he_IL",
          "container_id": "tradingview_chart"
        });
        </script>
    </div>

    <section id="pricing" class="pricing">
        <h2 class="gold-text">תוכניות מנוי</h2>
        <div class="pricing-grid">
            <div class="price-card">
                <h3>חודשי</h3>
                <div style="font-size: 2.5rem; margin: 15px 0;">₪149</div>
                <p>גישה מלאה לכל הנכסים</p>
                <p>סיגנלים בזמן אמת</p>
                <a href="https://t.me/Tradingprince123_bot" class="btn" style="padding: 10px 25px;">רכישה</a>
            </div>
            <div class="price-card featured">
                <h3>👑 VIP רבעוני</h3>
                <div style="font-size: 2.5rem; margin: 15px 0;">₪299</div>
                <p>3 חודשים של שקט</p>
                <p>אסטרטגיית בולינג'ר פרימיום</p>
                <p>תמיכה אישית</p>
                <a href="https://t.me/Tradingprince123_bot" class="btn" style="padding: 10px 25px;">המשתלם ביותר</a>
            </div>
        </div>
    </section>

</body>
</html>
